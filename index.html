<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <title>WWF | 북극곰 보호 캠페인</title>
    <link rel="shortcut icon" href="./images/logo.jpg" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/common.css">
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/responsive.css">
</head>
<body>
    <div id="wrap">
        <!-- 1. 캠페인 표지 -->
        <section class="container intro">
            <p class="logo"><img src="./images/logo.jpg" alt="wwf"></p>
            <h1><span>생존의 벼랑 끝에 서 있는</span><span>북극곰을 지켜주세요</span></h1>
            <a href="#" class="sponsor_btn"><em>북극곰 후원하기</em><!-- after --></a>
        </section>
        <!-- 2. 퀴즈 -->
        <div class="container quiz_bg">
            <section class="contents quiz">
                <div class="quiz_list">
                    <h1>Quiz</h1>
                    <h2><span>20년 사이 북극 빙하 면적은</span><span> 몇 % 감소하였을까요?</span></h2>
                    <form action="#" method="get" id="answer_form">
                        <ul>
                            <li>
                                <input type="radio" name="answer" value="ans_30" id="ans_30">
                                <label for="ans_30">30%</label>
                            </li>
                            <li>
                                <input type="radio" name="answer" value="ans_40" id="ans_40">
                                <label for="ans_40">40%</label>
                            </li>
                            <li>
                                <input type="radio" name="answer" value="ans_50" id="ans_50">
                                <label for="ans_50">50%</label>
                            </li>
                            <li>
                                <input type="radio" name="answer" value="ans_60" id="ans_60">
                                <label for="ans_60">60%</label>
                            </li>
                        </ul>
                        <button type="submit" id="check_btn">정답확인하기</button>
                    </form>
                </div>
                <div class="quiz_status">
                    <img src="./images/quiz_contents.png" alt="퀴즈 참여 현황 5529명 참여">
                    <p>*퀴즈 참여 현황은 매주 업데이트됩니다.</p>
                </div>
            </section>
        </div>
        <!-- 3. 영상 -->

</body>
</html>
